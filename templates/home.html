<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ASCII-ART-WEB</title>
  </head>
  <body
    style="
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
    "
  >
    <h1>ASCII ART GENERATOR</h1>
    <form
      action="/ascii-art"
      method="POST"
      style="
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 10px;
      "
    >
      <div>
        <textarea
          name="inputText"
          style="width: 700px; height: 200px; font-size: x-large"
          id="input"
          placeholder="Enter a text..."
        >
{{ .Text}}</textarea
        >
      </div>
      <div>
        <select
          name="bannerType"
          id="banner"
          style="
            margin: 20px;
            height: 30px;
            width: 190px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
          "
        >
          <option id="ban1" value="standard">Standard</option>
          <option id="ban2" value="shadow">Shadow</option>
          <option id="ban3" value="thinkertoy">Thinkertoy</option>
        </select>
      </div>
      <div>
        <button
          type="submit"
          style="
            width: 150px;
            padding: 5px 0px;
            font-weight: bold;
            font-size: larger;
          "
        >
          GENERATE
        </button>
      </div>
    </form>

    {{if .Result}}
    <div
      id="out"
      style="
        background-color: black;
        height: fit-content;
        min-width: 700px;
        max-width: 80%;
        overflow-x: auto;
        scroll-behavior: smooth;
        white-space: nowrap;
        margin: 20px;
      "
    >
      <pre style="color: white">{{ .Result}}</pre>
    </div>
    <button>
      <a href="/" style="text-decoration: none; color: black">Home</a>
    </button>
    {{end}}
  </body>
</html>
